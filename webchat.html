<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ကြယ်စင် — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Palette — "night market": warm lantern gold on deep indigo,
       the feel of a Yangon night bazaar where fast-fashion drops happen after dark */
    --ink:      #14101f;   /* deepest indigo-black background */
    --panel:    #1e1830;   /* raised chat surface */
    --panel-2:  #271f3d;   /* bubbles / raised cards */
    --line:     #362b52;   /* hairline borders */
    --gold:     #f4c95d;   /* lantern gold — primary accent */
    --gold-dim: #c99b3f;
    --rose:     #e8657f;   /* secondary accent — used sparingly */
    --text:     #ece7f5;   /* primary text */
    --muted:    #9a8fb5;   /* secondary text */
    --agent-bubble: #241d38;
    --user-bubble:  linear-gradient(135deg, #f4c95d, #e0a94a);
    --ok:       #5fd08a;
    --radius:   18px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  html,body{ height:100%; }
  body{
    font-family:'Padauk','Sora',system-ui,sans-serif;
    background:var(--ink);
    color:var(--text);
    display:flex; flex-direction:column;
    height:100dvh; overflow:hidden;
  }

  /* ── Header ─────────────────────────────────────────── */
  .header{
    display:flex; align-items:center; gap:12px;
    padding:14px 18px;
    background:linear-gradient(180deg, #221a36, #1a1429);
    border-bottom:1px solid var(--line);
    position:relative; z-index:5;
  }
  .brand-mark{
    width:42px; height:42px; border-radius:12px;
    background:radial-gradient(circle at 35% 30%, #f4c95d, #c1802b);
    display:grid; place-items:center;
    font-family:'Sora'; font-weight:700; font-size:20px; color:#2a1d05;
    box-shadow:0 0 18px rgba(244,201,93,.35);
    flex-shrink:0;
  }
  .brand-info{ display:flex; flex-direction:column; line-height:1.25; }
  .brand-name{ font-family:'Sora'; font-weight:600; font-size:16px; letter-spacing:.2px; }
  .brand-status{ font-size:12px; color:var(--muted); display:flex; align-items:center; gap:5px; }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--ok); box-shadow:0 0 6px var(--ok); }

  /* ── Chat scroll area ───────────────────────────────── */
  .chat{
    flex:1; overflow-y:auto;
    padding:20px 16px 8px;
    display:flex; flex-direction:column; gap:14px;
    scroll-behavior:smooth;
  }
  .chat::-webkit-scrollbar{ width:0; }

  .row{ display:flex; gap:9px; align-items:flex-end; max-width:100%; }
  .row.user{ flex-direction:row-reverse; }
  .avatar{
    width:28px; height:28px; border-radius:9px; flex-shrink:0;
    background:radial-gradient(circle at 35% 30%, #f4c95d, #c1802b);
    display:grid; place-items:center; font-family:'Sora'; font-weight:700;
    font-size:13px; color:#2a1d05;
  }
  .row.user .avatar{ display:none; }

  .bubble{
    padding:11px 15px; border-radius:var(--radius);
    font-size:15px; line-height:1.55; max-width:78vw;
    word-wrap:break-word; white-space:pre-wrap;
    animation:pop .28s cubic-bezier(.2,.9,.3,1.2);
  }
  .row.agent .bubble{
    background:var(--agent-bubble);
    border:1px solid var(--line);
    border-bottom-left-radius:6px;
    color:var(--text);
  }
  .row.user .bubble{
    background:var(--user-bubble);
    color:#2a1d05; font-weight:500;
    border-bottom-right-radius:6px;
  }
  @keyframes pop{ from{ opacity:0; transform:translateY(8px) scale(.97);} to{ opacity:1; transform:none;} }

  /* ── Product carousel ───────────────────────────────── */
  .carousel{
    display:flex; gap:12px; overflow-x:auto;
    padding:4px 16px 12px; scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .carousel::-webkit-scrollbar{ height:0; }
  .card{
    flex:0 0 190px; scroll-snap-align:start;
    background:var(--panel-2); border:1px solid var(--line);
    border-radius:16px; overflow:hidden;
    display:flex; flex-direction:column;
    animation:pop .3s cubic-bezier(.2,.9,.3,1.2);
  }
  .card-img{
    height:200px; background:linear-gradient(135deg,#3a2f57,#241d38);
    display:grid; place-items:center; color:var(--muted); font-size:13px;
    position:relative;
  }
  .card-img .code-tag{
    position:absolute; top:8px; left:8px;
    background:rgba(20,16,31,.82); color:var(--gold);
    font-family:'Sora'; font-weight:600; font-size:11px;
    padding:3px 8px; border-radius:7px; letter-spacing:.5px;
  }
  .card-body{ padding:11px 12px 13px; display:flex; flex-direction:column; gap:7px; }
  .card-name{ font-size:14px; font-weight:700; line-height:1.35; }
  .card-price{ font-family:'Sora'; font-weight:600; font-size:15px; color:var(--gold); }
  .card-btn{
    margin-top:3px; padding:9px; border:none; border-radius:10px;
    background:linear-gradient(135deg,#f4c95d,#e0a94a);
    color:#2a1d05; font-family:'Padauk'; font-weight:700; font-size:14px;
    cursor:pointer; transition:transform .12s, filter .12s;
  }
  .card-btn:active{ transform:scale(.96); filter:brightness(1.08); }

  /* ── Typing indicator ───────────────────────────────── */
  .typing{ display:flex; gap:4px; padding:14px 16px; }
  .typing span{
    width:7px; height:7px; border-radius:50%; background:var(--muted);
    animation:blink 1.3s infinite both;
  }
  .typing span:nth-child(2){ animation-delay:.2s; }
  .typing span:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{ 0%,60%,100%{opacity:.25; transform:translateY(0);} 30%{opacity:1; transform:translateY(-3px);} }

  /* ── Quick replies ──────────────────────────────────── */
  .quick{
    display:flex; gap:8px; padding:2px 16px 6px; flex-wrap:wrap;
  }
  .chip{
    padding:8px 14px; border:1px solid var(--gold-dim); border-radius:999px;
    background:transparent; color:var(--gold); font-family:'Padauk';
    font-size:13.5px; cursor:pointer; transition:background .15s, transform .1s;
  }
  .chip:active{ transform:scale(.95); background:rgba(244,201,93,.12); }

  /* ── Composer ───────────────────────────────────────── */
  .composer{
    display:flex; align-items:flex-end; gap:9px;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg,#1a1429,#1e1830);
    border-top:1px solid var(--line);
  }
  .icon-btn{
    width:44px; height:44px; border-radius:13px; flex-shrink:0;
    border:1px solid var(--line); background:var(--panel-2);
    display:grid; place-items:center; cursor:pointer; color:var(--gold);
    transition:transform .1s, background .15s;
  }
  .icon-btn:active{ transform:scale(.93); background:var(--panel); }
  .icon-btn svg{ width:21px; height:21px; }
  .input-wrap{
    flex:1; display:flex; align-items:center;
    background:var(--panel-2); border:1px solid var(--line);
    border-radius:13px; padding:2px 4px 2px 14px;
  }
  #input{
    flex:1; border:none; background:transparent; color:var(--text);
    font-family:'Padauk'; font-size:15px; padding:11px 0; resize:none;
    max-height:110px; line-height:1.4; outline:none;
  }
  #input::placeholder{ color:var(--muted); }
  .send-btn{
    width:40px; height:40px; border-radius:11px; flex-shrink:0; border:none;
    background:linear-gradient(135deg,#f4c95d,#e0a94a);
    display:grid; place-items:center; cursor:pointer; color:#2a1d05;
    transition:transform .1s, filter .12s;
  }
  .send-btn:active{ transform:scale(.9); filter:brightness(1.1); }
  .send-btn svg{ width:20px; height:20px; }
  .send-btn:disabled{ opacity:.4; filter:grayscale(.5); cursor:default; }

  /* image preview chip in composer */
  .img-preview{
    display:none; align-items:center; gap:8px;
    padding:6px 10px; margin:0 14px 8px;
    background:var(--panel-2); border:1px solid var(--gold-dim);
    border-radius:11px; font-size:13px; color:var(--muted);
  }
  .img-preview.show{ display:flex; }
  .img-preview img{ width:34px; height:34px; border-radius:7px; object-fit:cover; }
  .img-preview button{
    margin-left:auto; background:none; border:none; color:var(--rose);
    font-size:18px; cursor:pointer; line-height:1;
  }

  /* reduced motion */
  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; scroll-behavior:auto !important; }
  }
</style>
</head>
<body>

  <div class="header">
    <div class="brand-mark">က</div>
    <div class="brand-info">
      <span class="brand-name">ကြယ်စင်</span>
      <span class="brand-status"><span class="dot"></span> အွန်လိုင်း • ချက်ချင်း ဖြေပါတယ်</span>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="img-preview" id="imgPreview">
    <img id="imgThumb" alt="">
    <span id="imgName">ပုံ တင်ထားသည်</span>
    <button onclick="clearImage()" aria-label="ပုံ ဖယ်ရန်">×</button>
  </div>

  <div class="composer">
    <button class="icon-btn" onclick="document.getElementById('file').click()" aria-label="ပုံ တင်ရန်">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
      </svg>
    </button>
    <input type="file" id="file" accept="image/*" hidden onchange="onFile(event)">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="စာရိုက်ပါ..." oninput="autoGrow(this)" onkeydown="onKey(event)"></textarea>
    </div>
    <button class="send-btn" id="send" onclick="send()" aria-label="ပို့ရန်">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG — Phase W1 backend ပြီးရင် ဒီနေရာ တစ်ကြောင်းပဲ ပြင်ပါ
   ═══════════════════════════════════════════════════════════════ */
const CONFIG = {
  // false = mock flow (backend မပြီးသေး) ; true = real n8n webhook
  USE_REAL_BACKEND: false,
  // Phase W1 ပြီးရင် အောက်က placeholder ကို real URL နဲ့ အစားထိုးပါ
  WEBHOOK_URL: "https://n8n.srv1695682.hstgr.cloud/webhook/webchat",
};

/* Session — browser UUID (Messenger PSID အစား)။ device တစ်ခုတည်းမှာ persist */
let sessionId = localStorage.getItem('ks_session');
if(!sessionId){
  sessionId = (crypto.randomUUID ? crypto.randomUUID()
              : 'ks-' + Date.now() + '-' + Math.random().toString(36).slice(2));
  localStorage.setItem('ks_session', sessionId);
}

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
let pendingImage = null;   // { dataUrl, name }
let lastSendAt = 0;        // client-side rate limit

/* ── Rendering helpers ─────────────────────────────── */
function bubble(text, who){
  const row = document.createElement('div');
  row.className = 'row ' + who;
  if(who === 'agent'){
    const av = document.createElement('div');
    av.className = 'avatar'; av.textContent = 'က';
    row.appendChild(av);
  }
  const b = document.createElement('div');
  b.className = 'bubble'; b.textContent = text;
  row.appendChild(b);
  chat.appendChild(row);
  scrollDown();
}

function imageBubble(dataUrl){
  const row = document.createElement('div');
  row.className = 'row user';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.style.padding = '5px';
  const img = document.createElement('img');
  img.src = dataUrl;
  img.style.cssText = 'max-width:200px; border-radius:12px; display:block;';
  b.appendChild(img);
  row.appendChild(b);
  chat.appendChild(row);
  scrollDown();
}

function carousel(items){
  const wrap = document.createElement('div');
  wrap.className = 'carousel';
  items.forEach(it => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-img">
        <span class="code-tag">${it.code}</span>
        ${it.img ? `<img src="${it.img}" style="width:100%;height:100%;object-fit:cover">` : 'ပုံ'}
      </div>
      <div class="card-body">
        <div class="card-name">${it.name}</div>
        <div class="card-price">${it.price}</div>
        <button class="card-btn" onclick="buy('${it.code}','${it.name}')">ဝယ်မည်</button>
      </div>`;
    wrap.appendChild(card);
  });
  chat.appendChild(wrap);
  scrollDown();
}

function quickReplies(list){
  const wrap = document.createElement('div');
  wrap.className = 'quick';
  list.forEach(txt => {
    const chip = document.createElement('button');
    chip.className = 'chip'; chip.textContent = txt;
    chip.onclick = () => { wrap.remove(); handleUserText(txt); };
    wrap.appendChild(chip);
  });
  chat.appendChild(wrap);
  scrollDown();
}

let typingEl = null;
function showTyping(){
  hideTyping();
  const row = document.createElement('div');
  row.className = 'row agent'; row.id = '__typing';
  row.innerHTML = `<div class="avatar">က</div>
    <div class="bubble typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(row); typingEl = row; scrollDown();
}
function hideTyping(){ if(typingEl){ typingEl.remove(); typingEl = null; } }

function scrollDown(){ requestAnimationFrame(()=>{ chat.scrollTop = chat.scrollHeight; }); }

/* ── Composer behaviour ────────────────────────────── */
function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
function onKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
}
function onFile(e){
  const f = e.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    pendingImage = { dataUrl: reader.result, name: f.name };
    document.getElementById('imgThumb').src = reader.result;
    document.getElementById('imgName').textContent = f.name;
    document.getElementById('imgPreview').classList.add('show');
  };
  reader.readAsDataURL(f);
  e.target.value = '';
}
function clearImage(){
  pendingImage = null;
  document.getElementById('imgPreview').classList.remove('show');
}

function send(){
  const text = input.value.trim();
  if(!text && !pendingImage) return;

  // rate limit — 800ms
  const now = Date.now();
  if(now - lastSendAt < 800) return;
  lastSendAt = now;

  if(pendingImage){
    imageBubble(pendingImage.dataUrl);
    const img = pendingImage; clearImage();
    input.value=''; autoGrow(input);
    routeMessage(text, img);
    return;
  }
  bubble(text, 'user');
  input.value=''; autoGrow(input);
  routeMessage(text, null);
}

function handleUserText(txt){ bubble(txt,'user'); routeMessage(txt,null); }
function buy(code,name){ handleUserText(`${code} ဝယ်မယ်`); }

/* ── Message routing ───────────────────────────────────
   Real backend ချိတ်ရင် ဒီ function တစ်ခုပဲ အလုပ်လုပ်မယ်။
   Mock flow က UI/UX စမ်းသပ်ဖို့သာ။                        */
async function routeMessage(text, image){
  showTyping();
  if(CONFIG.USE_REAL_BACKEND){
    try{
      const res = await fetch(CONFIG.WEBHOOK_URL, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          text: text || '',
          image: image ? image.dataUrl : null,   // base64 data URL
        }),
      });
      const data = await res.json();
      hideTyping();
      renderAgentResponse(data);   // expects { reply, products?, quick? }
    }catch(err){
      hideTyping();
      bubble('ခဏ ဆက်သွယ်မှု ပြတ်သွားပါတယ်။ ထပ်ကြိုးစားပေးပါ။', 'agent');
    }
  }else{
    mockRespond(text, image);
  }
}

function renderAgentResponse(data){
  if(data.reply) bubble(data.reply, 'agent');
  if(data.products && data.products.length) carousel(data.products);
  if(data.quick && data.quick.length) quickReplies(data.quick);
}

/* ── MOCK FLOW (UI demo only — real flow replaces this) ── */
const MOCK_PRODUCTS = [
  { code:'A01', name:'ဂါဝန် ပန်းရောင်', price:'၁၈,၀၀၀ ကျပ်' },
  { code:'A02', name:'ထဘီ ကွင်း အနက်', price:'၁၀,၀၀၀ ကျပ်' },
  { code:'A03', name:'ရှပ်အင်္ကျီ အဖြူ', price:'၁၂,၀၀၀ ကျပ်' },
];
function mockRespond(text, image){
  setTimeout(()=>{
    hideTyping();
    const t = (text||'').toLowerCase();
    if(image){
      bubble('ပုံနဲ့ ဆင်တူတဲ့ ပစ္စည်းတွေ ရှာပေးလိုက်ပါတယ် —', 'agent');
      carousel(MOCK_PRODUCTS.slice(0,2));
    }else if(t.includes('ဝယ်')){
      bubble('ကောင်းပါပြီ 🌟 ဒီပစ္စည်းအတွက် အော်ဒါ စတင်ပါမယ်။\nအမည်၊ ဖုန်း၊ လိပ်စာ ပေးပါ။', 'agent');
    }else if(t.includes('စာရင်း') || t.includes('ကြည့်') || t.includes('ပစ္စည်း')){
      bubble('ဒီနေ့ အသစ်ဝင် ပစ္စည်းတွေ ဒီမှာ ကြည့်ပါ —', 'agent');
      carousel(MOCK_PRODUCTS);
    }else{
      bubble('မင်္ဂလာပါ ကြယ်စင်မှ ကြိုဆိုပါတယ် 🌟\nဘာများ ကူညီပေးရမလဲ?', 'agent');
      quickReplies(['ပစ္စည်းစာရင်း ကြည့်မယ်','ပုံနဲ့ ရှာမယ်','ဈေးနှုန်း မေးမယ်']);
    }
  }, 750 + Math.random()*400);
}

/* ── Greeting on load ──────────────────────────────── */
window.addEventListener('DOMContentLoaded', ()=>{
  setTimeout(()=>{
    bubble('မင်္ဂလာပါ 🌟 ကြယ်စင် အွန်လိုင်းမှ ကြိုဆိုပါတယ်။\nဒီနေ့ ဘာများ ရှာနေတာလဲ?', 'agent');
    quickReplies(['ပစ္စည်းစာရင်း ကြည့်မယ်','ပုံနဲ့ ရှာမယ်','ဘယ်လို မှာရမလဲ']);
  }, 400);
});
</script>
</body>
</html>
